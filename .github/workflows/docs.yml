name: Deploy Docs

on:
  push:
    branches: ['main']
    paths:
      - 'docs/**'
      - 'src/**'
      - '.github/workflows/docs.yml'

  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install root dependencies
        run: pnpm install

      - name: Build library
        run: pnpm build

      - name: Install docs dependencies
        run: pnpm install
        working-directory: docs

      - name: Build docs
        run: pnpm build
        working-directory: docs

      - name: Prevent Jekyll processing
        run: touch docs/dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
